name: PR cleanup (GHCR preview tags)

on:
  pull_request:
    types:
      - closed

permissions:
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          persist-credentials: false

      - name: Delete preview package versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          chmod +x .github/scripts/cleanup-pr-ghcr.sh
          .github/scripts/cleanup-pr-ghcr.sh \
            "${PR_NUMBER}" \
            "${GITHUB_REPOSITORY_OWNER}" \
            "fbi-uploader"
